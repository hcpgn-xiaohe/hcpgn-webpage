<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0"
    />
    <!-- 多语言版本声明 -->
    <link
      rel="alternate"
      hreflang="zh-CN"
      href="/zh-cn/games/studytousegodot/"
    />
    <link
      rel="alternate"
      hreflang="en-US"
      href="/en-us/games/studytousegodot/"
    />

    <!-- 默认语言版本 -->
    <link
      rel="alternate"
      hreflang="x-default"
      href="/zh-cn/games/studytousegodot/"
    />

    <title>学习使用Godot</title>
    <link rel="stylesheet" href="/css/godot-game.css" />
    <link
      id="-gd-engine-icon"
      rel="icon"
      type="image/png"
      href="index.icon.png"
    />
    <link rel="apple-touch-icon" href="index.apple-touch-icon.png" />
  </head>
  <body>
    <canvas id="canvas"> Your browser does not support the canvas tag. </canvas>

    <noscript> Your browser does not support JavaScript. </noscript>

    <div id="status">
      <img
        id="status-splash"
        class="show-image--true fullsize--true use-filter--true"
        src="index.png"
        alt=""
      />
      <progress id="status-progress"></progress>
      <div id="status-notice"></div>
    </div>

    <script src="index.js"></script>
    <script src="/js/godot-game.js"></script>
  </body>
</html>
