<!doctype html>
<!-- 声明HTML5文档类型 -->
<html lang="zh-CN">
  <!-- 文档根元素，指定语言为简体中文 -->
  <head>
    <!-- 文档元信息区域 -->

    <!-- 文档字符编码声明 -->
    <meta http-equiv="content-Type" content="text/html; charset=utf-8" />

    <!-- 响应式视口设置（移动端关键配置） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 多语言版本声明 -->
    <link rel="alternate" hreflang="zh-CN" href="/zh-cn/about/" />
    <link rel="alternate" hreflang="en-US" href="/en-us/about/" />

    <!-- 默认语言版本 -->
    <link rel="alternate" hreflang="x-default" href="/zh-cn/about/" />

    <!-- 页面标题（SEO核心要素） -->
    <title>关于 - 盒鸽 HcDove</title>

    <!-- 页面描述（SEO核心要素） -->
    <meta name="description" content="盒鸽 HcDove - 专注于游戏和科技的团队" />
    <!-- 页面关键词（SEO核心要素） -->
    <meta name="keywords" content="盒鸽,HcDove,游戏,科技,团队" />

    <!-- 外部CSS样式表引用（带版本号控制缓存） -->
    <link rel="stylesheet" href="/css/style.css?v=1.0.8" />
    <!-- 网站图标引用 -->
    <link
      rel="icon"
      href="/images/logo.svg"
      type="image/svg+xml"
      sizes="32x32"
    />
    <link rel="apple-touch-icon" href="/images/logo.svg" />
    <!-- 导航菜单切换脚本 -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const hamburger = document.querySelector(".hamburger");
        const navMenu = document.querySelector(".nav-menu");

        if (hamburger && navMenu) {
          hamburger.addEventListener("click", function () {
            hamburger.classList.toggle("active");
            navMenu.classList.toggle("active");
          });
        }
      });
    </script>
  </head>

  <body>
    <!-- 页面主体内容 -->

    <!-- 导航栏容器 -->
    <header class="navbar">
      <!-- Logo链接（页面主LOGO） -->
      <a href="/zh-cn/" class="nav-item">
        <!-- 品牌Logo图像（需保持可访问性） -->
        <img src="/images/logo.svg" alt="Logo" class="logo" />
      </a>

      <!-- 汉堡菜单按钮 -->
      <button class="hamburger" aria-label="菜单">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <!-- 导航菜单容器 -->
      <div class="nav-menu">
        <!-- 导航链接容器 -->
        <div class="nav-links">
          <!-- 主导航链接组 -->
          <!-- 首页链接 -->
          <a href="/zh-cn/" class="nav-item">主页</a>
          <a href="/zh-cn/games/" class="nav-item">游戏</a>
          <a href="/zh-cn/ai/" class="nav-item">AI制作</a>
          <!-- 关于页面链接 -->
          <a href="/zh-cn/about/" class="nav-item active">关于</a>
        </div>

        <!-- 语言切换组件 -->
        <div class="lang-switch">
          <!-- 当前语言标识 -->
          <span class="active">中</span>
          <!-- 语言分隔符 -->
          <span class="or1">|</span>
          <!-- 英文语言链接 -->
          <a href="/en-us/about/" class="langchosen">En</a>
        </div>
      </div>
    </header>

    <!-- 页面主内容区域 -->
    <main class="content">
      <!-- 主标题（SEO关键词重点） -->
      <h1>关于我们</h1>
      <!-- 内容描述 -->
      <p>盒鸽 HcDove成立于2022年，是一个专注于游戏和科技的团队。</p>
      <p>我们致力于通过技术创新，为用户带来优质的游戏体验和科技产品。</p>
      <p>感谢您对盒鸽 HcDove的支持与关注！</p>
    </main>

    <!-- 1px辅助分割线（内容间隔） -->
    <div class="divider-1px"></div>

    <!-- 页面底部区域 -->
    <footer class="footer">
      <!-- 联系方式 -->
      <div>联系我们</div>

      <!-- 社交媒体图标组 -->
      <div class="social-icons">
        <!-- 哔哩哔哩官方链接 -->
        <a
          href="https://space.bilibili.com/1016692202/"
          title="哔哩哔哩"
          target="_blank"
          rel="noopener"
        >
          <!-- 哔哩哔哩图标（需保持可访问性） -->
          <img src="/images/bilibili.png" alt="哔哩哔哩" class="social-icon" />
        </a>
        <!-- 抖音官方链接 -->
        <a
          href="https://www.douyin.com/user/MS4wLjABAAAALiqkpu3Zp8I56vEpV46mEreYBIA2jFqRk-wSPZqOVbE/"
          title="抖音"
          target="_blank"
          rel="noopener"
        >
          <!-- 抖音图标（需保持可访问性） -->
          <img src="/images/douyin.png" alt="抖音" class="social-icon" />
        </a>
      </div>

      <!-- MiSans字体声明 -->
      <div class="font-credit">
        本网站使用
        <a href="https://hyperos.mi.com/font/" target="_blank" rel="noopener"
          >MiSans</a
        >
        字体
      </div>
    </footer>
  </body>
</html>
