<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>关于-盒鸽 HcDove</title>
    <meta
      name="description"
      content="关于盒鸽 HcDove，专注于游戏和科技的团队"
    />
    <meta name="keywords" content="盒鸽,HcDove,游戏,科技,团队介绍" />
    <!-- 语言切换 -->
    <link rel="alternate" hreflang="zh-CN" href="/zh-cn/about/index.html" />
    <link rel="alternate" hreflang="en-US" href="/en-us/about/index.html" />
    <!-- 默认语言版本 -->
    <link rel="alternate" hreflang="x-default" href="/zh-cn/about/index.html" />
  </head>
  <body>
    <script>
      // 检测浏览器语言，跳转到对应语言的关于页面
      function getBrowserLanguage() {
        const lang = navigator.language || navigator.userLanguage;
        return lang.toLowerCase();
      }

      const browserLang = getBrowserLanguage();
      if (browserLang.startsWith("en")) {
        window.location.href = "/en-us/about/index.html";
      } else {
        window.location.href = "/zh-cn/about/index.html";
      }
    </script>
  </body>
</html>
