<!doctype html>
<!-- 声明HTML5文档类型 -->
<html>
  <head>
    <!-- 设置页面字符编码为UTF-8 -->
    <meta http-equiv="content-Type" content="text/html; charset=utf-8" />
    <!-- 响应式视口设置（移动端关键配置） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 多语言声明 -->
    <link rel="alternate" hreflang="zh-CN" href="/zh-cn/index.html" />
    <link rel="alternate" hreflang="en-US" href="/en-us/index.html" />

    <!-- 默认语言版本 -->
    <link rel="alternate" hreflang="x-default" href="/zh-cn/index.html" />
    <!-- 外部CSS样式表引用（带版本号控制缓存） -->
    <link rel="stylesheet" href="/css/style.css?v=1.0.8" />
    <!-- 网站图标引用 -->
    <link rel="icon" href="/images/logo.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/images/logo.png" />
    <!-- 外部JavaScript文件引用 -->
    <script src="/js/lang-detection.js"></script>
    <!-- 导航菜单切换脚本 -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const hamburger = document.querySelector(".hamburger");
        const navMenu = document.querySelector(".nav-menu");

        if (hamburger && navMenu) {
          hamburger.addEventListener("click", function () {
            hamburger.classList.toggle("active");
            navMenu.classList.toggle("active");
          });
        }
      });
    </script>
  </head>
  <body>
    <!-- 页面内容将由JavaScript动态生成 -->
  </body>
</html>
